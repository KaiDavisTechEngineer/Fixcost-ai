# Render Blueprint for FixCost AI — a persistent Node web service.
# Render reads this on "New + > Blueprint" from the connected repo.
services:
  - type: web
    name: fixcost-ai
    runtime: node
    plan: starter            # free tier also works; starter avoids cold-start sleeps
    region: oregon
    branch: main
    # --include=dev so Vite (a devDependency) installs even under NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # set this as a secret in the Render dashboard
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: NODE_VERSION
        value: "20"
